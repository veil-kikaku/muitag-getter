<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>むいまにあ タグ投稿まとめ</title>

<link rel="stylesheet" href="style.css">

<script async src="https://platform.twitter.com/widgets.js"></script>

</head>

<body>

<div class="container">

<h1>むいまにあ タグ投稿まとめ</h1>

<p>
タグ検索に表示されない方は投稿URLを登録してください。
</p>

<div class="form">

<input
id="url"
type="url"
placeholder="https://x.com/.../status/...">

<button id="send">
投稿する
</button>

</div>

<div id="message"></div>

<hr>

<h2>
投稿一覧
(<span id="count">0</span>)
</h2>

<div id="posts">
読み込み中...
</div>

</div>

<script src="app.js"></script>

</body>
</html>
