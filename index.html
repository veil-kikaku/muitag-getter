<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>むいまにあ投稿まとめ</title>

<link rel="stylesheet" href="style.css">

<script async src="https://platform.twitter.com/widgets.js"></script>

</head>

<body>

<div class="container">

<h1>むいまにあ投稿まとめ</h1>

<p>
タグ検索に表示されない方は、
投稿URLを入力してください。
</p>

<form
    action="https://script.google.com/macros/s/AKfycbxlqdV0P2AyuKDpvWJvurXqbSdCPS4-nT8N3RK1ul6rEeSzhE3BkAL_M2hD2bRsqAKc/exec"
    method="POST"
    target="hiddenFrame">

    <input
        type="url"
        name="url"
        id="url"
        placeholder="https://x.com/xxxxx/status/123456789"
        required>

    <button>
        投稿する
    </button>

</form>

<iframe
    name="hiddenFrame"
    style="display:none;">
</iframe>

<p id="message"></p>

<hr>

<h2>投稿一覧</h2>

<div id="posts"></div>

</div>

<script src="app.js"></script>

</body>
</html>
